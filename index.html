<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>هايبر كفو | أقوى بوت في التاريخ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1927 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        /* تصميم بطيء وجميل بدون تعقيدات */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* الهيدر */
        .header {
            text-align: center;
            background: rgba(10, 25, 40, 0.8);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            background: #ff006e;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.9em;
            margin-top: 15px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }

        /* شبكة الإحصائيات */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 140px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00f2fe;
        }

        .stat-icon {
            font-size: 2.2em;
            margin-bottom: 8px;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #00f2fe;
        }

        /* قنوات اليوتيوب */
        .channels-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 40px;
        }

        .channel-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .channel-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .channel-icon {
            font-size: 2.5em;
        }

        .channel-name {
            flex: 1;
        }

        .channel-name h3 {
            font-size: 1.2em;
        }

        .channel-name a {
            color: #00f2fe;
            text-decoration: none;
            font-size: 0.85em;
            word-break: break-all;
        }

        .video-placeholder {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-placeholder iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .channel-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-item span:first-child {
            display: block;
            font-weight: bold;
            color: #4facfe;
        }

        /* البوتات */
        .bots-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .bots-section h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.6em;
        }

        .bots-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .bot-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            min-width: 130px;
            flex: 1;
        }

        .bot-card .name {
            color: #00f2fe;
            font-weight: bold;
        }

        /* الخوادم */
        .servers-list {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .servers-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
        }

        .server-tag {
            background: linear-gradient(135deg, #00f2fe20, #4facfe20);
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.85em;
            border: 1px solid #00f2fe40;
        }

        /* زر التشغيل */
        .action-btn {
            background: linear-gradient(45deg, #ff006e, #4facfe);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            display: block;
            width: fit-content;
            margin: 20px auto;
            transition: 0.3s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,0,110,0.5);
        }

        /* تحذير */
        .warning {
            background: rgba(255, 0, 110, 0.15);
            border: 1px solid #ff006e;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
        }

        .warning p {
            color: #ff006e;
            font-weight: bold;
        }

        /* الفوتر */
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 0.8em;
        }

        /* للجوال */
        @media (max-width: 550px) {
            .stat-number { font-size: 1.4em; }
            .header h1 { font-size: 1.6em; }
            .channel-title { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- الهيدر -->
    <div class="header">
        <h1>🚀 هايبر كفو | HYPER KAFO</h1>
        <p>أقوى وأسرع بوت في التاريخ 🔥</p>
        <div class="badge">⚡ أسرع بوت ⚡</div>
    </div>

    <!-- إحصائيات -->
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">🤖</div><div class="stat-number" id="botsCount">0</div><div>عدد البوتات</div></div>
        <div class="stat-card"><div class="stat-icon">🖥️</div><div class="stat-number" id="serversCount">0</div><div>الخوادم</div></div>
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-number" id="usersCount">0</div><div>المستخدمين</div></div>
        <div class="stat-card"><div class="stat-icon">📺</div><div class="stat-number" id="channelsCount">2</div><div>القنوات</div></div>
    </div>

    <!-- قنوات اليوتيوب المطلوبة -->
    <div class="channels-grid" id="channelsGrid"></div>

    <!-- البوتات -->
    <div class="bots-section">
        <h2>🤖 أقوى البوتات</h2>
        <div class="bots-list" id="botsList"></div>
    </div>

    <!-- الخوادم -->
    <div class="servers-list">
        <h3>🏆 أفضل الخوادم المتصلة</h3>
        <div class="servers-tags" id="serversTags"></div>
    </div>

    <!-- زر التشغيل -->
    <button class="action-btn" id="runBtn">🚀 تشغيل البوت الآن</button>

    <!-- تحذير -->
    <div class="warning">
        <p>⚠️ تحذير: هذا البوت سيتم حظره قريباً بسبب سرعته الخارقة! ⚠️</p>
    </div>

    <div class="footer">
        <p>© 2024 هايبر كفو - أقوى بوت في التاريخ</p>
    </div>
</div>

<script>
    // البيانات
    const channels = [
        {
            name: "هايبر كفو | HYPER ALSO",
            handle: "@haiperalso",
            url: "https://youtube.com/@haiperalso",
            videoId: "3JZ_D3ELwOQ",
            subs: "124K",
            views: "2.3M"
        },
        {
            name: "هايبر إكس إي | HYPER EXE",
            handle: "@haiperexe",
            url: "https://youtube.com/@haiperexe",
            videoId: "HG3KkYpJk3c",
            subs: "89.5K",
            views: "1.7M"
        }
    ];

    const bots = [
        { name: "Hyper Bot V1", status: "نشط", servers: "1,523" },
        { name: "Hyper Security", status: "نشط", servers: "892" },
        { name: "Hyper Manager", status: "نشط", servers: "1,245" },
        { name: "Hyper Music", status: "نشط", servers: "2,100" },
        { name: "Hyper Speed", status: "أسرع بوت", servers: "999" },
        { name: "Hyper AI", status: "ذكي", servers: "756" }
    ];

    const serversList = [
        "💎 VIP Server - 2.5K", "🎮 Gaming Hub - 5.8K", "🚀 Hyper Community - 12K",
        "🔒 Security Zone - 3.2K", "🎵 Music World - 4.1K", "⚡ Speed Network - 7.4K"
    ];

    // عرض القنوات
    function showChannels() {
        const container = document.getElementById('channelsGrid');
        container.innerHTML = '';
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <div class="channel-title">
                    <div class="channel-icon">📺</div>
                    <div class="channel-name">
                        <h3>${ch.name}</h3>
                        <a href="${ch.url}" target="_blank">${ch.handle}</a>
                    </div>
                </div>
                <div class="video-placeholder">
                    <iframe src="https://www.youtube.com/embed/${ch.videoId}" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="channel-stats">
                    <div class="stat-item"><span>${ch.subs}</span><span>مشترك</span></div>
                    <div class="stat-item"><span>${ch.views}</span><span>مشاهدة</span></div>
                    <div class="stat-item"><span>⭐4.9</span><span>تقييم</span></div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // عرض البوتات
    function showBots() {
        const container = document.getElementById('botsList');
        container.innerHTML = '';
        bots.forEach(bot => {
            const div = document.createElement('div');
            div.className = 'bot-card';
            div.innerHTML = `<div class="name">🤖 ${bot.name}</div><div>${bot.status}</div><div>📊 ${bot.servers} سيرفر</div>`;
            container.appendChild(div);
        });
    }

    // عرض الخوادم
    function showServers() {
        const container = document.getElementById('serversTags');
        container.innerHTML = '';
        serversList.forEach(s => {
            const span = document.createElement('span');
            span.className = 'server-tag';
            span.innerText = s;
            container.appendChild(span);
        });
    }

    // تحديث الأرقام (حركي)
    let botsCount = 0, serversCount = 0, usersCount = 0;
    const targetBots = 48, targetServers = 15428, targetUsers = 892345;

    function animateCounters() {
        const botsEl = document.getElementById('botsCount');
        const serversEl = document.getElementById('serversCount');
        const usersEl = document.getElementById('usersCount');

        const interval = setInterval(() => {
            let changed = false;
            if (botsCount < targetBots) {
                botsCount += Math.ceil(targetBots / 40);
                if (botsCount > targetBots) botsCount = targetBots;
                botsEl.innerText = botsCount.toLocaleString();
                changed = true;
            }
            if (serversCount < targetServers) {
                serversCount += Math.ceil(targetServers / 45);
                if (serversCount > targetServers) serversCount = targetServers;
                serversEl.innerText = serversCount.toLocaleString();
                changed = true;
            }
            if (usersCount < targetUsers) {
                usersCount += Math.ceil(targetUsers / 50);
                if (usersCount > targetUsers) usersCount = targetUsers;
                usersEl.innerText = usersCount.toLocaleString();
                changed = true;
            }
            if (!changed) clearInterval(interval);
        }, 25);
    }

    // تشغيل البوت
    function startBot() {
        const btn = document.getElementById('runBtn');
        btn.innerText = '⏳ جاري التفعيل...';
        btn.disabled = true;
        setTimeout(() => {
            animateCounters();
            btn.innerText = '✅ تم التشغيل بنجاح!';
            setTimeout(() => {
                btn.innerText = '🚀 تشغيل البوت الآن';
                btn.disabled = false;
            }, 2000);
            // رسالة منبثقة
            const msg = document.createElement('div');
            msg.innerText = '🔥 تم تفعيل البوت الخارق! سيتم الحظر خلال 24 ساعة 🔥';
            msg.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff006e;color:white;padding:10px 20px;border-radius:50px;z-index:1000;font-weight:bold;animation:fadeOut 3s forwards';
            const style = document.createElement('style');
            style.textContent = '@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}';
            document.head.appendChild(style);
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }, 1500);
    }

    // ربط الزر
    document.getElementById('runBtn').addEventListener('click', startBot);

    // تحميل أولي
    window.onload = () => {
        showChannels();
        showBots();
        showServers();
        document.getElementById('botsCount').innerText = '0';
        document.getElementById('serversCount').innerText = '0';
        document.getElementById('usersCount').innerText = '0';
        document.getElementById('channelsCount').innerText = '2';
    };
</script>
</body>
</html>
